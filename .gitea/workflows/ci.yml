name: Mongolian AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Test Mongolian Text Processor
        run: |
          cd core
          python3 mongolian_text.py
      
      - name: Test Chat Engine
        run: |
          cd core
          python3 chat_engine.py
      
      - name: Test Main CLI
        run: |
          python3 main.py --text "ᠰᠠᠶᠢᠨ"
  
  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create distribution
        run: |
          mkdir -p dist
          cp -r core main.py requirements.txt README.md dist/
          tar -czf dist/mongolian-ai-assistant.tar.gz -C dist .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongolian-ai-assistant
          path: dist/mongolian-ai-assistant.tar.gz
