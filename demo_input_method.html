<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传统蒙古文 AI 助手 - 内嵌输入法</title>
    
    <!-- 引入蒙古文竖排 CSS -->
    <link rel="stylesheet" href="mongolian-vertical.css">
    
    <!-- 加载字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #007AFF;
            --primary-dark: #0056CC;
            --success: #34C759;
            --gray-100: #F2F2F7;
            --gray-200: #E5E5EA;
            --gray-300: #D1D1D6;
            --white: #FFFFFF;
            --black: #000000;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #F2F2F7 0%, #FFFFFF 100%);
            min-height: 100vh;
            padding-bottom: 220px;
        }
        
        /* 导航栏 */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--gray-200);
            padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
            z-index: 100;
        }
        
        .navbar-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar-title {
            font-size: 17px;
            font-weight: 600;
        }
        
        /* 聊天区域 */
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 17px;
            overflow-x: auto;
        }
        
        .message.user .message-content {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-content {
            background: white;
            color: var(--black);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        /* 竖排蒙古文容器 - 固定高度，自动换列 */
        .mongolian-vertical-container {
            height: 200px;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex !important;
            flex-direction: row !important;
            gap: 4px;
            padding: 0;
            align-items: flex-start;
            justify-content: flex-start;
            writing-mode: horizontal-tb !important; /* 容器横向排列，内容竖向显示 */
        }
        
        /* 单个竖排列 */
        .mongolian-column {
            font-family: 'Mongolian Baiti', 'Noto Sans Mongolian', sans-serif !important;
            font-size: 24px;
            line-height: 0.9;
            height: auto;
            min-height: 100%;
            flex-shrink: 0;
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-start;
            justify-content: flex-start;
            margin-top: -10px;
            padding-top: 0;
        }
        
        .mongolian-vertical {
            font-family: 'Mongolian Baiti', 'Noto Sans Mongolian', sans-serif !important;
            font-size: 24px;
            line-height: 0.9;
            display: inline-block !important;
            margin: 0;
            padding: 0;
            vertical-align: top;
            transform: rotate(90deg) !important; /* 向右旋转 90 度 */
            transform-origin: center center;
        }
        
        /* 内嵌输入法 */
        .input-method-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--gray-100);
            border-top: 0.5px solid var(--gray-300);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        
        /* 输入框区域 */
        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .input-field {
            flex: 1;
            border: 0.5px solid var(--gray-300);
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 17px;
            background: white;
            transition: all 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        /* 蒙古文键盘 - 竖排 */
        .mongolian-keyboard {
            background: white;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .keyboard-column {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .key {
            width: 44px;
            height: 44px;
            border: 0.5px solid var(--gray-200);
            border-radius: 6px;
            background: white;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .key:active {
            background: var(--primary);
            color: white;
            transform: scale(0.9);
        }
        
        .key .mongolian-vertical {
            font-size: 20px;
            max-height: 35px;
            display: inline-block !important;
            font-family: 'Mongolian Baiti', 'Noto Sans Mongolian', sans-serif !important;
            transform: rotate(90deg) !important; /* 向右旋转 90 度 */
            transform-origin: center center;
        }
        
        /* 中文/英文需要旋转 90 度，蒙古文不需要 */
        /* 中文/英文向左旋转 90 度竖排 */
        .key .latin-or-chinese {
            transform: rotate(-90deg);
            transform-origin: center center;
            display: inline-block;
        }
        
        .key-tall {
            height: 92px;
        }
        
        .key-tall .mongolian-vertical {
            max-height: 80px;
        }
        
        .key-tall .latin-or-chinese {
            transform: rotate(-90deg);
            display: inline-block;
        }
        
        .key-enter {
            height: 92px;
            background: var(--primary);
            color: white;
        }
        
        .key-enter .mongolian-vertical {
            max-height: 80px;
            color: white;
        }
        
        .key-enter .latin-or-chinese {
            transform: rotate(-90deg);
            color: white;
            display: inline-block;
        }
        
        /* 候选词区域 */
        .candidate-area {
            background: white;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            display: none;
            overflow-x: auto;
        }
        
        .candidate-area.active {
            display: flex;
            gap: 8px;
        }
        
        .candidate-item {
            padding: 8px 16px;
            background: var(--gray-100);
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .candidate-item:hover {
            background: var(--primary);
            color: white;
        }
        
        /* 输入模式切换 */
        .input-mode-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: var(--gray-200);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mode-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* 拉丁转写提示 */
        .transliteration-hint {
            font-size: 12px;
            color: var(--gray-400);
            text-align: center;
            margin-top: 4px;
        }
        
        /* 响应式 */
        @media (max-width: 400px) {
            .key {
                max-width: 35px;
                height: 40px;
                font-size: 16px;
            }
            
            .key-space {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">
                <span class="mongolian-vertical" style="font-size: 16px; max-height: 40px;">🐎 ᠮᠣᠩᠭᠣᠯ AI</span>
            </div>
        </div>
    </nav>
    
    <!-- 聊天区域 -->
    <div class="chat-container">
        <div id="chat-content">
            <!-- 对话内容 -->
        </div>
    </div>
    
    <!-- 内嵌输入法 -->
    <div class="input-method-container">
        <!-- 输入模式切换 -->
        <div class="input-mode-switch">
            <button class="mode-btn active" onclick="switchKeyboard('mongolian')">
                <span class="mongolian-vertical" style="font-size: 14px; max-height: 30px;">ᠮᠣᠩᠭᠣᠯ</span>
            </button>
            <button class="mode-btn" onclick="switchKeyboard('latin')">
                <span class="mongolian-vertical" style="font-size: 14px; max-height: 30px;">Latin</span>
            </button>
        </div>
        
        <!-- 候选词区域 -->
        <div class="candidate-area" id="candidate-area"></div>
        
        <!-- 输入框 -->
        <div class="input-area">
            <input 
                type="text" 
                class="input-field" 
                id="message-input"
                placeholder="输入蒙古文..."
            >
            <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
        
        <!-- 蒙古文键盘 - 竖排 -->
        <div class="mongolian-keyboard" id="mongolian-keyboard">
            <!-- 第 1 列：元音 -->
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('ᠠ')"><span class="mongolian-vertical">ᠠ</span></div>
                <div class="key" onclick="inputChar('ᠡ')"><span class="mongolian-vertical">ᠡ</span></div>
                <div class="key" onclick="inputChar('ᠢ')"><span class="mongolian-vertical">ᠢ</span></div>
                <div class="key" onclick="inputChar('ᠣ')"><span class="mongolian-vertical">ᠣ</span></div>
                <div class="key" onclick="inputChar('ᠤ')"><span class="mongolian-vertical">ᠤ</span></div>
                <div class="key" onclick="inputChar('ᠥ')"><span class="mongolian-vertical">ᠥ</span></div>
                <div class="key" onclick="inputChar('ᠦ')"><span class="mongolian-vertical">ᠦ</span></div>
            </div>
            
            <!-- 第 2 列：辅音 1 -->
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('ᠨ')"><span class="mongolian-vertical">ᠨ</span></div>
                <div class="key" onclick="inputChar('ᠪ')"><span class="mongolian-vertical">ᠪ</span></div>
                <div class="key" onclick="inputChar('ᠫ')"><span class="mongolian-vertical">ᠫ</span></div>
                <div class="key" onclick="inputChar('ᠬ')"><span class="mongolian-vertical">ᠬ</span></div>
                <div class="key" onclick="inputChar('ᠭ')"><span class="mongolian-vertical">ᠭ</span></div>
                <div class="key" onclick="inputChar('ᠮ')"><span class="mongolian-vertical">ᠮ</span></div>
                <div class="key" onclick="inputChar('ᠯ')"><span class="mongolian-vertical">ᠯ</span></div>
            </div>
            
            <!-- 第 3 列：辅音 2 -->
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('ᠰ')"><span class="mongolian-vertical">ᠰ</span></div>
                <div class="key" onclick="inputChar('ᠱ')"><span class="mongolian-vertical">ᠱ</span></div>
                <div class="key" onclick="inputChar('ᠲ')"><span class="mongolian-vertical">ᠲ</span></div>
                <div class="key" onclick="inputChar('ᠳ')"><span class="mongolian-vertical">ᠳ</span></div>
                <div class="key" onclick="inputChar('ᠴ')"><span class="mongolian-vertical">ᠴ</span></div>
                <div class="key" onclick="inputChar('ᠵ')"><span class="mongolian-vertical">ᠵ</span></div>
                <div class="key" onclick="inputChar('ᠶ')"><span class="mongolian-vertical">ᠶ</span></div>
            </div>
            
            <!-- 第 4 列：辅音 3 + 功能 -->
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('ᠷ')"><span class="mongolian-vertical">ᠷ</span></div>
                <div class="key" onclick="inputChar('ᠸ')"><span class="mongolian-vertical">ᠸ</span></div>
                <div class="key" onclick="inputChar('ᠹ')"><span class="mongolian-vertical">ᠹ</span></div>
                <div class="key" onclick="inputChar('ᠺ')"><span class="mongolian-vertical">ᠺ</span></div>
                <div class="key" onclick="inputChar('ᠻ')"><span class="mongolian-vertical">ᠻ</span></div>
                <div class="key" onclick="inputChar('ᠼ')"><span class="mongolian-vertical">ᠼ</span></div>
                <div class="key key-tall" onclick="deleteChar()"><span class="mongolian-vertical">⌫</span></div>
            </div>
            
            <!-- 第 5 列：标点 + 空格 + 发送 -->
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('᠂')"><span class="mongolian-vertical">᠂</span></div>
                <div class="key" onclick="inputChar('᠃')"><span class="mongolian-vertical">᠃</span></div>
                <div class="key" onclick="inputChar('᠄')"><span class="mongolian-vertical">᠄</span></div>
                <div class="key key-tall" onclick="inputChar(' ')"><span class="latin-or-chinese">空格</span></div>
                <div class="key key-enter" onclick="sendMessage()"><span class="latin-or-chinese">发送</span></div>
            </div>
            
            <!-- 拉丁转写提示 -->
            <div class="transliteration-hint">
                提示：也可以用拉丁字母转写输入（如：sain bainuu）
            </div>
        </div>
        
        <!-- 拉丁键盘（隐藏）- 竖排 -->
        <div class="mongolian-keyboard" id="latin-keyboard" style="display: none;">
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('a')"><span class="mongolian-vertical">a</span></div>
                <div class="key" onclick="inputChar('e')"><span class="mongolian-vertical">e</span></div>
                <div class="key" onclick="inputChar('i')"><span class="mongolian-vertical">i</span></div>
                <div class="key" onclick="inputChar('o')"><span class="mongolian-vertical">o</span></div>
                <div class="key" onclick="inputChar('u')"><span class="mongolian-vertical">u</span></div>
                <div class="key" onclick="inputChar('ü')"><span class="mongolian-vertical">ü</span></div>
                <div class="key" onclick="inputChar('ö')"><span class="mongolian-vertical">ö</span></div>
            </div>
            
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('n')"><span class="mongolian-vertical">n</span></div>
                <div class="key" onclick="inputChar('b')"><span class="mongolian-vertical">b</span></div>
                <div class="key" onclick="inputChar('p')"><span class="mongolian-vertical">p</span></div>
                <div class="key" onclick="inputChar('q')"><span class="mongolian-vertical">q</span></div>
                <div class="key" onclick="inputChar('γ')"><span class="mongolian-vertical">γ</span></div>
                <div class="key" onclick="inputChar('m')"><span class="mongolian-vertical">m</span></div>
                <div class="key" onclick="inputChar('l')"><span class="mongolian-vertical">l</span></div>
            </div>
            
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('s')"><span class="mongolian-vertical">s</span></div>
                <div class="key" onclick="inputChar('š')"><span class="mongolian-vertical">š</span></div>
                <div class="key" onclick="inputChar('t')"><span class="mongolian-vertical">t</span></div>
                <div class="key" onclick="inputChar('d')"><span class="mongolian-vertical">d</span></div>
                <div class="key" onclick="inputChar('č')"><span class="mongolian-vertical">č</span></div>
                <div class="key" onclick="inputChar('j')"><span class="mongolian-vertical">j</span></div>
                <div class="key" onclick="inputChar('y')"><span class="mongolian-vertical">y</span></div>
            </div>
            
            <div class="keyboard-column">
                <div class="key" onclick="inputChar('r')"><span class="mongolian-vertical">r</span></div>
                <div class="key" onclick="inputChar('w')"><span class="mongolian-vertical">w</span></div>
                <div class="key" onclick="inputChar('f')"><span class="mongolian-vertical">f</span></div>
                <div class="key" onclick="inputChar('k')"><span class="mongolian-vertical">k</span></div>
                <div class="key" onclick="inputChar('g')"><span class="mongolian-vertical">g</span></div>
                <div class="key" onclick="inputChar('h')"><span class="mongolian-vertical">h</span></div>
                <div class="key key-tall" onclick="deleteChar()"><span class="mongolian-vertical">⌫</span></div>
            </div>
            
            <div class="keyboard-column">
                <div class="key" onclick="inputChar(',')"><span class="mongolian-vertical">,</span></div>
                <div class="key" onclick="inputChar('.')"><span class="mongolian-vertical">.</span></div>
                <div class="key" onclick="inputChar('?')"><span class="mongolian-vertical">?</span></div>
                <div class="key key-tall" onclick="inputChar(' ')"><span class="latin-or-chinese">Space</span></div>
                <div class="key key-enter" onclick="sendMessage()"><span class="latin-or-chinese">Send</span></div>
            </div>
        </div>
    </div>
    
    <script>
        // 对话数据
        let chatData = [
            { 
                role: 'ai', 
                text: 'ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨ᠎ᠠ ᠤᠤ？ᠪᠢ ᠮᠣᠩᠭᠣᠯ AI ᠲᠡᠭᠦᠰᠯᠡᠭᠴᠢ ᠪᠠᠶᠢᠨ᠎ᠠ᠃ ᠲᠠᠨᠳ ᠲᠤᠰᠠᠯᠠᠭ᠎ᠠ ᠪᠠᠶᠢᠭ᠎ᠠ ᠤᠤ？',
                time: getCurrentTime()
            },
        ];
        
        // 获取当前时间
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
        
        // 渲染对话 - 支持自动换列
        function renderChat() {
            const chatContent = document.getElementById('chat-content');
            chatContent.innerHTML = '';
            
            chatData.forEach(message => {
                const messageEl = document.createElement('div');
                messageEl.className = `message ${message.role}`;
                
                messageEl.innerHTML = `
                    <div class="avatar">${message.role === 'user' ? '👤' : '🤖'}</div>
                    <div class="message-content">
                        <div class="mongolian-vertical-container" id="msg-${Date.now()}-${Math.random()}"></div>
                    </div>
                `;
                
                chatContent.appendChild(messageEl);
                
                // 渲染竖排文字，自动换列
                const container = messageEl.querySelector('.mongolian-vertical-container');
                renderVerticalText(container, message.text);
            });
            
            scrollToBottom();
        }
        
        // 渲染竖排文字 - 固定高度，自动换列
        function renderVerticalText(container, text) {
            const CHAR_HEIGHT = 43; // 每个字符高度（24px font + 1.8 line-height + gap）
            const MAX_HEIGHT = 200; // 容器最大高度
            const MAX_CHARS_PER_COLUMN = Math.floor(MAX_HEIGHT / CHAR_HEIGHT); // 每列最大字符数
            
            // 移除空格，只保留蒙古文字符
            const chars = text.split('').filter(c => c.trim());
            
            let currentColumn = null;
            let charCount = 0;
            
            chars.forEach((char, index) => {
                // 如果当前列为空或已满，创建新列
                if (!currentColumn || charCount >= MAX_CHARS_PER_COLUMN) {
                    currentColumn = document.createElement('div');
                    currentColumn.className = 'mongolian-column';
                    container.appendChild(currentColumn);
                    charCount = 0;
                }
                
                // 添加字符到当前列
                const charEl = document.createElement('span');
                charEl.className = 'mongolian-vertical';
                charEl.textContent = char;
                currentColumn.appendChild(charEl);
                
                charCount++;
            });
            
            // 自动滚动到最右列
            container.scrollLeft = container.scrollWidth;
        }
        
        // 滚动到底部
        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }
        
        // 输入字符
        function inputChar(char) {
            const input = document.getElementById('message-input');
            input.value += char;
            input.focus();
            showCandidates(char);
        }
        
        // 删除字符
        function deleteChar() {
            const input = document.getElementById('message-input');
            input.value = input.value.slice(0, -1);
            input.focus();
        }
        
        // 显示候选词
        function showCandidates(char) {
            const candidateArea = document.getElementById('candidate-area');
            const input = document.getElementById('message-input');
            const inputValue = input.value;
            
            // 简单候选词示例
            const candidates = {
                'ᠰᠠᠶ': ['ᠰᠠᠶᠢᠨ', 'ᠰᠠᠶᠢᠬᠤ'],
                'ᠪᠠᠶ': ['ᠪᠠᠶᠢᠨ᠎ᠠ', 'ᠪᠠᠶᠠᠷᠯᠠᠯ᠎ᠠ'],
                'ᠮᠣᠩ': ['ᠮᠣᠩᠭᠣᠯ', 'ᠮᠣᠩᠭᠣᠯᠴᠢᠨ'],
            };
            
            // 查找匹配的候选词
            let matched = [];
            for (const [key, words] of Object.entries(candidates)) {
                if (inputValue.includes(key)) {
                    matched = words;
                    break;
                }
            }
            
            if (matched.length > 0) {
                candidateArea.innerHTML = matched.map(word => 
                    `<div class="candidate-item" onclick="selectCandidate('${word}')">
                        <span class="mongolian-vertical" style="font-size: 18px; max-height: 80px;">${word}</span>
                    </div>`
                ).join('');
                candidateArea.classList.add('active');
            } else {
                candidateArea.classList.remove('active');
            }
        }
        
        // 选择候选词
        function selectCandidate(word) {
            const input = document.getElementById('message-input');
            input.value = word;
            document.getElementById('candidate-area').classList.remove('active');
            input.focus();
        }
        
        // 切换键盘
        function switchKeyboard(type) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (type === 'mongolian') {
                document.getElementById('mongolian-keyboard').style.display = 'block';
                document.getElementById('latin-keyboard').style.display = 'none';
                event.target.classList.add('active');
            } else {
                document.getElementById('mongolian-keyboard').style.display = 'none';
                document.getElementById('latin-keyboard').style.display = 'block';
                event.target.classList.add('active');
            }
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text) return;
            
            // 添加用户消息
            chatData.push({
                role: 'user',
                text: text,
                time: getCurrentTime()
            });
            
            input.value = '';
            document.getElementById('candidate-area').classList.remove('active');
            renderChat();
            
            // 模拟 AI 回复
            setTimeout(() => {
                chatData.push({
                    role: 'ai',
                    text: 'ᠮᠡᠳᠡᠭᠡ ᠪᠠᠶᠢᠨ᠎ᠠ！ᠪᠢ ᠲᠠᠨᠳ ᠲᠤᠰᠠᠯᠠᠭ᠎ᠠ ᠪᠣᠯᠨᠠ᠃',
                    time: getCurrentTime()
                });
                renderChat();
            }, 1000);
        }
        
        // 回车发送
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // 拉丁转写转换（简单示例）
        const transliterationMap = {
            'sain': 'ᠰᠠᠶᠢᠨ',
            'baina': 'ᠪᠠᠶᠢᠨ᠎ᠠ',
            'uu': 'ᠤᠤ',
            'bayarlala': 'ᠪᠠᠶᠠᠷᠯᠠᠯ᠎ᠠ',
            'monggol': 'ᠮᠣᠩᠭᠣᠯ',
            'kele': 'ᠬᠡᠯᠡ',
        };
        
        // 初始化
        renderChat();
    </script>
</body>
</html>
