<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传统蒙古文 AI 助手 - 竖排换行显示</title>
    
    <!-- 加载 Noto Sans Mongolian 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .chat-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* 传统蒙古文竖排样式 - 按句子长度换行 */
        .mongolian {
            writing-mode: vertical-lr;           /* 上到下，列从左到右 */
            text-orientation: mixed;             /* 字符方向 */
            font-family: "Noto Sans Mongolian", "Mongolian Baiti", sans-serif;
            font-size: 32px;
            line-height: 1.8;
            max-height: 400px;                   /* 限制高度，超出自动换行 */
            overflow-y: auto;                    /* 允许垂直滚动 */
            border: 1px solid #ccc;
            padding: 16px;
            background: #fafafa;
            border-radius: 10px;
        }
        
        .chat-row {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .role-label {
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
            min-width: 80px;
            text-align: center;
            padding: 10px;
            background: #f0f4ff;
            border-radius: 10px;
            height: fit-content;
        }
        
        .user-label {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .ai-label {
            background: #fff3e0;
            color: #e65100;
        }
        
        .message {
            flex: 1;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 18px;
        }
        
        .info-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            color: white;
        }
        
        .info-box h3 {
            margin-bottom: 10px;
            font-size: 24px;
            writing-mode: horizontal-tb;
        }
        
        .info-box ul {
            list-style: none;
            writing-mode: horizontal-tb;
        }
        
        .info-box li {
            padding: 5px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐎 传统蒙古文 AI 助手</h1>
            <p>Mongolian AI Assistant - Traditional Vertical Script</p>
        </header>
        
        <div class="chat-container">
            <h2 style="text-align: center; margin-bottom: 20px; color: #1e3c72;">
                📜 传统蒙古文竖排显示（按句子长度换行）
            </h2>
            
            <div id="chat-content">
                <!-- 对话内容将由 JavaScript 加载 -->
            </div>
        </div>
        
        <div class="info-box">
            <h3>📝 关于传统蒙古文竖排</h3>
            <ul>
                <li>✅ 从上到下书写</li>
                <li>✅ 从左到右换行（列与列之间）</li>
                <li>✅ 按句子/词语长度自然换行</li>
                <li>✅ writing-mode: vertical-lr</li>
                <li>✅ text-orientation: mixed</li>
                <li>✅ max-height 限制高度，自动换行</li>
            </ul>
        </div>
        
        <footer>
            <p>🚀 Gitea 自驱动开发 | v1.6.0 | 2026-03-30</p>
        </footer>
    </div>
    
    <script>
        // 示例对话数据
        const chatData = [
            { round: 1, user: "ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨᠤᠤ？ᠲᠠ ᠬᠡᠨ ᠪᠡᠨ？", ai: "ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨᠠ！ᠪᠢ ᠮᠣᠩᠭᠣᠯ AI ᠲᠠᠨᠢᠯᠴᠠᠭᠤᠯᠠᠭᠴᠢ ᠪᠠᠶᠢᠨᠠ᠃ ᠲᠠᠨᠳ ᠲᠤᠰᠠᠯᠠᠭᠠ ᠪᠠᠶᠢᠭᠠ ᠤᠤ？" },
            { round: 2, user: "ᠪᠢ ᠮᠣᠩᠭᠣᠯ ᠬᠡᠯᠡ ᠰᠤᠷᠤᠮᠠᠷ ᠪᠠᠶᠢᠨᠠ᠃", ai: "ᠮᠡᠳᠡᠭᠡ ᠪᠠᠶᠢᠨᠠ！ᠪᠢ ᠲᠠᠨᠳ ᠮᠣᠩᠭᠣᠯ ᠬᠡᠯᠡ ᠰᠤᠷᠤᠬᠤᠳᠠ ᠲᠤᠰᠠᠯᠠᠭᠠ ᠪᠣᠯᠨᠠ᠃" },
            { round: 3, user: "ᠮᠣᠩᠭᠣᠯ ᠪᠢᠴᠢᠭ ᠬᠡᠷᠬᠡᠨ ᠰᠤᠷᠬᠤ ᠪᠡ？", ai: "ᠮᠣᠩᠭᠣᠯ ᠪᠢᠴᠢᠭ ᠰᠤᠷᠬᠤᠳᠠ ᠡᠬᠢᠯᠡᠪᠡᠷ ᠰᠤᠷᠬᠤ ᠬᠡᠷᠡᠭᠲᠠᠢ᠃ ᠡᠬᠢᠯᠡᠪᠡᠷ：ᠠ，ᠡ，ᠢ，ᠣ，ᠤ，ᠥ，ᠦ..." },
            { round: 4, user: "ᠪᠠᠶᠠᠷᠲᠠᠢ！", ai: "ᠪᠠᠶᠠᠷᠲᠠᠢ！ᠮᠢᠨᠦ ᠲᠤᠰᠠᠯᠠᠭᠠ ᠪᠣᠯᠤᠭᠰᠠᠨᠳᠠ ᠪᠠᠶᠠᠷᠯᠠᠭ᠎ᠠ ᠪᠠᠶᠢᠨᠠ᠃" },
            { round: 5, user: "ᠪᠠᠶᠠᠷ ᠬᠦᠷᠦᠭᠡ！", ai: "ᠪᠠᠶᠠᠷ ᠬᠦᠷᠦᠭᠡ！ᠳᠠᠷᠤᠢ ᠤᠳᠠ ᠤᠴᠢᠷᠠᠯᠴᠢᠶᠡ᠃" },
        ];
        
        // 渲染对话
        const chatContent = document.getElementById('chat-content');
        
        chatData.forEach((chat, index) => {
            const chatItem = document.createElement('div');
            chatItem.className = 'chat-item';
            chatItem.innerHTML = `
                <div class="chat-row">
                    <div class="role-label user-label">
                        <div style="writing-mode: horizontal-tb;">👤 第${chat.round}轮</div>
                    </div>
                    <div class="message">
                        <div class="mongolian">${chat.user}</div>
                    </div>
                </div>
                <div class="chat-row">
                    <div class="role-label ai-label">
                        <div style="writing-mode: horizontal-tb;">🤖 AI</div>
                    </div>
                    <div class="message">
                        <div class="mongolian">${chat.ai}</div>
                    </div>
                </div>
            `;
            chatContent.appendChild(chatItem);
        });
    </script>
</body>
</html>
