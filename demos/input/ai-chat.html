<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蒙古文 AI 助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
.header { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; padding: 20px; text-align: center; }
.header h1 { font-size: 24px; margin-bottom: 8px; }
.chat-area { height: 450px; display: flex; gap: 20px; padding: 20px; background: #f8f9fa; }
.chat-column { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 0; }
.chat-column.ai { align-items: flex-start; }
.chat-column.user { align-items: flex-end; }
.column-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 0; padding: 8px 0; flex-shrink: 0; border-bottom: 1px solid #e0e0e0; width: 100%; }
.column-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.12); margin-bottom: 4px; }
.column-label { font-size: 11px; color: #666; font-weight: bold; }
.message { margin: 0; max-width: 100%; display: flex; }
.message.ai { justify-content: flex-start; margin-top: 8px; }
.message.user { flex-direction: row-reverse; justify-content: flex-end; }
.message-content { padding: 0; border-radius: 0; font-size: 16px; max-width: 100%; }
.message.user .message-content { background: transparent; color: #1e40af; padding-right: 0; }
.message.ai .message-content { background: transparent; color: #333; padding-left: 0; }

/* ✅ 蒙古文竖排 - Transform 旋转 90 度 */
.mn {
    display: inline-block !important;
    transform: rotate(90deg) !important;
    transform-origin: top right !important;
    font-family: 'Noto Sans Mongolian', sans-serif !important;
    line-height: 1.6 !important;
    white-space: nowrap !important;
    direction: rtl !important;
    text-align: right !important;
    max-width: 300px !important;
}
.message.ai .mn {
    margin: 0 !important;
}
.message.user .mn {
    margin-left: 10px !important;
}

.input-area { padding: 16px; background: white; border-top: 1px solid #e0e0e0; }
.mongolian-textarea { width: 100%; min-height: 80px; border: 2px solid #e0e0e0; border-radius: 10px; padding: 12px; font-size: 18px; font-family: 'Noto Sans Mongolian', sans-serif; }
.input-tools { display: flex; gap: 8px; margin-top: 12px; }
.tool-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #f0f0f0; font-size: 13px; cursor: pointer; }
.tool-btn.primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.keyboard { margin-top: 16px; background: #f8f9fa; border-radius: 10px; padding: 12px; }
.keyboard-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.keyboard-tab { padding: 6px 12px; border: none; border-radius: 16px; background: white; font-size: 12px; cursor: pointer; }
.keyboard-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.keyboard-section { margin-bottom: 12px; }
.keyboard-row { display: flex; gap: 4px; margin-bottom: 4px; flex-wrap: wrap; }
.key { flex: 1; min-width: 36px; max-width: 44px; height: 40px; border: 1px solid #ddd; border-radius: 5px; background: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.key:hover { background: #f0f0f0; }
.key:active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.key-label { font-size: 8px; color: #999; }

/* 键盘蒙古文字符竖排 */
.mn-key span:first-child {
    transform: rotate(90deg) !important;
    display: block !important;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🤖 蒙古文 AI 助手</h1>
        <p>Mongolian AI Assistant</p>
    </div>
    
    <div class="chat-area" id="chat-area">
        <div class="chat-column ai" id="ai-column">
            <div class="column-header">
                <div class="column-avatar">🤖</div>
                <div class="column-label">AI</div>
            </div>
        </div>
        <div class="chat-column user" id="user-column">
            <div class="column-header">
                <div class="column-avatar">👤</div>
                <div class="column-label">你</div>
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <textarea class="mongolian-textarea" id="input" placeholder="ᠮᠣᠩᠭᠣᠯ ᠪᠢᠴᠢᠭ ᠣᠷᠤᠭᠤᠯᠤᠨᠠ..."></textarea>
        <div class="input-tools">
            <button class="tool-btn" onclick="clearInput()">清空</button>
            <button class="tool-btn primary" onclick="send()">发送</button>
        </div>
        
        <div class="keyboard">
            <div class="keyboard-tabs">
                <button class="keyboard-tab active" onclick="showKb('v')">元音</button>
                <button class="keyboard-tab" onclick="showKb('c1')">辅音 1</button>
                <button class="keyboard-tab" onclick="showKb('c2')">辅音 2</button>
                <button class="keyboard-tab" onclick="showKb('f')">功能</button>
            </div>
            
            <div id="kb-v" class="keyboard-section">
                <div class="keyboard-row">
                    <div class="key mn-key" onclick="inp('ᠠ')"><span>ᠠ</span><span class="key-label">A</span></div>
                    <div class="key mn-key" onclick="inp('ᠡ')"><span>ᠡ</span><span class="key-label">E</span></div>
                    <div class="key mn-key" onclick="inp('ᠢ')"><span>ᠢ</span><span class="key-label">I</span></div>
                    <div class="key mn-key" onclick="inp('ᠣ')"><span>ᠣ</span><span class="key-label">O</span></div>
                    <div class="key mn-key" onclick="inp('ᠤ')"><span>ᠤ</span><span class="key-label">U</span></div>
                    <div class="key mn-key" onclick="inp('ᠥ')"><span>ᠥ</span><span class="key-label">Ö</span></div>
                    <div class="key mn-key" onclick="inp('ᠦ')"><span>ᠦ</span><span class="key-label">Ü</span></div>
                </div>
            </div>
            
            <div id="kb-c1" class="keyboard-section" style="display:none">
                <div class="keyboard-row">
                    <div class="key mn-key" onclick="inp('ᠨ')"><span>ᠨ</span><span class="key-label">N</span></div>
                    <div class="key mn-key" onclick="inp('ᠪ')"><span>ᠪ</span><span class="key-label">B</span></div>
                    <div class="key mn-key" onclick="inp('ᠫ')"><span>ᠫ</span><span class="key-label">P</span></div>
                    <div class="key mn-key" onclick="inp('ᠬ')"><span>ᠬ</span><span class="key-label">Q</span></div>
                    <div class="key mn-key" onclick="inp('ᠭ')"><span>ᠭ</span><span class="key-label">G</span></div>
                    <div class="key mn-key" onclick="inp('ᠮ')"><span>ᠮ</span><span class="key-label">M</span></div>
                    <div class="key mn-key" onclick="inp('ᠯ')"><span>ᠯ</span><span class="key-label">L</span></div>
                </div>
            </div>
            
            <div id="kb-c2" class="keyboard-section" style="display:none">
                <div class="keyboard-row">
                    <div class="key mn-key" onclick="inp('ᠰ')"><span>ᠰ</span><span class="key-label">S</span></div>
                    <div class="key mn-key" onclick="inp('ᠱ')"><span>ᠱ</span><span class="key-label">Š</span></div>
                    <div class="key mn-key" onclick="inp('ᠲ')"><span>ᠲ</span><span class="key-label">T</span></div>
                    <div class="key mn-key" onclick="inp('ᠳ')"><span>ᠳ</span><span class="key-label">D</span></div>
                    <div class="key mn-key" onclick="inp('ᠴ')"><span>ᠴ</span><span class="key-label">Č</span></div>
                    <div class="key mn-key" onclick="inp('ᠵ')"><span>ᠵ</span><span class="key-label">J</span></div>
                    <div class="key mn-key" onclick="inp('ᠶ')"><span>ᠶ</span><span class="key-label">Y</span></div>
                </div>
            </div>
            
            <div id="kb-f" class="keyboard-section" style="display:none">
                <div class="keyboard-row">
                    <div class="key mn-key" onclick="inp('ᠷ')"><span>ᠷ</span><span class="key-label">R</span></div>
                    <div class="key mn-key" onclick="inp('ᠸ')"><span>ᠸ</span><span class="key-label">W</span></div>
                    <div class="key mn-key" onclick="inp('ᠹ')"><span>ᠹ</span><span class="key-label">F</span></div>
                    <div class="key" onclick="inp(' ')"><span>␣</span><span class="key-label">SPACE</span></div>
                    <div class="key" onclick="del()"><span>⌫</span><span class="key-label">DEL</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const responses = {
    'ᠰᠠᠶᠢᠨ': ['ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨ᠎ᠠ！ᠲᠠ ᠶᠠᠮᠠᠷ？', 'ᠮᠡᠳᠡᠭᠡ！'],
    'ᠪᠠᠶᠠᠷᠲᠠᠢ': ['ᠪᠠᠶᠠᠷᠲᠠᠢ！'],
    'default': ['ᠮᠡᠳᠡᠭᠡ！ᠪᠢ ᠲᠠᠨᠳ ᠲᠤᠰᠠᠯᠠᠭ᠎ᠠ ᠪᠣᠯᠨᠠ᠃']
};

function showKb(t) {
    document.querySelectorAll('.keyboard-section').forEach(k => k.style.display = 'none');
    document.querySelectorAll('.keyboard-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('kb-' + t).style.display = 'block';
    event.target.classList.add('active');
}

function inp(c) {
    document.getElementById('input').value += c;
}

function del() {
    const i = document.getElementById('input');
    i.value = i.value.slice(0, -1);
}

function clearInput() {
    document.getElementById('input').value = '';
}

function getResponse(input) {
    for (const [k, v] of Object.entries(responses)) {
        if (k !== 'default' && input.includes(k)) return v[Math.floor(Math.random() * v.length)];
    }
    return responses['default'][0];
}

function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    
    const userCol = document.getElementById('user-column');
    const aiCol = document.getElementById('ai-column');
    
    // 用户消息添加到右列
    const msg = document.createElement('div');
    msg.className = 'message user';
    msg.innerHTML = '<div class="message-content"><div class="mn">' + text + '</div></div>';
    userCol.appendChild(msg);
    
    input.value = '';
    userCol.scrollTop = userCol.scrollHeight;
    
    setTimeout(() => {
        // AI 回复添加到左列
        const ai = document.createElement('div');
        ai.className = 'message ai';
        ai.innerHTML = '<div class="message-content"><div class="mn">' + getResponse(text) + '</div></div>';
        aiCol.appendChild(ai);
        aiCol.scrollTop = aiCol.scrollHeight;
    }, 800);
}

document.getElementById('input').addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

showKb('v');
</script>
</body>
</html>
