<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>传统蒙古文 AI 助手 - UX 增强版</title>
    
    <!-- 引入蒙古文竖排 CSS -->
    <link rel="stylesheet" href="mongolian-vertical.css">
    
    <!-- 加载字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 颜色系统 */
            --primary: #007AFF;
            --primary-dark: #0056CC;
            --success: #34C759;
            --warning: #FF9500;
            --error: #FF3B30;
            --gray-100: #F2F2F7;
            --gray-200: #E5E5EA;
            --gray-300: #D1D1D6;
            --gray-400: #8E8E93;
            --gray-500: #636366;
            --white: #FFFFFF;
            --black: #000000;
            
            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.15);
            
            /* 动画 */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: linear-gradient(180deg, #F2F2F7 0%, #FFFFFF 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeOut 0.5s ease 1s forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 导航栏 */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--gray-200);
            padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
        }
        
        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .navbar-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--black);
        }
        
        .navbar-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--gray-100);
            color: var(--primary);
            font-size: 18px;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon-button:active {
            transform: scale(0.9);
            background: var(--gray-200);
        }
        
        /* 聊天容器 */
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }
        
        /* 欢迎卡片 */
        .welcome-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            color: white;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .welcome-card h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .welcome-card p {
            font-size: 15px;
            opacity: 0.9;
        }
        
        /* 快捷回复 - 横排（旧） */
        .quick-replies {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .quick-reply-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .quick-reply-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        
        /* 快捷菜单 - 竖排（新增） */
        .quick-replies-vertical {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        
        .quick-reply-btn-vertical {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .quick-reply-btn-vertical:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        
        .quick-reply-btn-vertical .mongolian-vertical {
            font-size: 20px;
            max-height: 120px;
        }
        
        /* 消息气泡 */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: messageIn 0.4s ease;
        }
        
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: var(--gray-100);
            box-shadow: var(--shadow-sm);
        }
        
        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 17px;
            line-height: 1.5;
            position: relative;
        }
        
        .message.user .message-content {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-content {
            background: var(--white);
            color: var(--black);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-md);
        }
        
        /* 竖排蒙古文 */
        .mongolian-vertical {
            writing-mode: vertical-lr;
            text-orientation: upright;
            -webkit-writing-mode: vertical-lr;
            -webkit-text-orientation: sideways-right;
            
            font-family: 'Noto Sans Mongolian', 'Mongolian Baiti', sans-serif;
            font-size: 24px;
            line-height: 1.8;
            letter-spacing: 1px;
            
            display: inline-block;
            max-height: 250px;
            overflow-y: auto;
        }
        
        /* 输入状态指示器 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--white);
            border-radius: 20px;
            width: fit-content;
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
            animation: messageIn 0.4s ease;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-400);
            animation: typingBounce 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }
        
        /* 输入框 */
        .input-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 0.5px solid var(--gray-200);
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
            box-shadow: var(--shadow-lg);
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        
        .message-input {
            width: 100%;
            border: 0.5px solid var(--gray-200);
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 17px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            transition: all var(--transition-fast);
        }
        
        .message-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .send-button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .send-button:active {
            transform: scale(0.9);
            background: var(--primary-dark);
        }
        
        .send-button:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
        }
        
        /* 分隔符 */
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 0.5px;
            background: var(--gray-200);
        }
        
        .divider span {
            position: relative;
            background: linear-gradient(180deg, #F2F2F7 0%, #FFFFFF 100%);
            padding: 0 12px;
            font-size: 13px;
            color: var(--gray-400);
        }
        
        /* 深色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --gray-100: #1C1C1E;
                --gray-200: #2C2C2E;
                --gray-300: #3A3A3C;
                --gray-400: #8E8E93;
                --gray-500: #AEAEB2;
                --white: #2C2C2E;
                --black: #FFFFFF;
            }
            
            body {
                background: linear-gradient(180deg, #000000 0%, #1C1C1E 100%);
            }
            
            .navbar {
                background: rgba(44, 44, 46, 0.95);
            }
            
            .typing-indicator {
                background: var(--gray-100);
            }
        }
        
        /* 响应式 */
        @media (max-width: 375px) {
            .message-content {
                max-width: 80%;
            }
            
            .mongolian-vertical {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">
                <span class="mongolian-vertical" style="font-size: 18px; max-height: 50px; vertical-align: middle;">🐎 ᠮᠣᠩᠭᠣᠯ AI</span>
            </div>
            <div class="navbar-actions">
                <button class="icon-button" onclick="toggleTheme()" title="切换主题">
                    <span class="mongolian-vertical" style="font-size: 14px; max-height: 25px;">🌙</span>
                </button>
                <button class="icon-button" onclick="clearChat()" title="清空对话">
                    <span class="mongolian-vertical" style="font-size: 14px; max-height: 25px;">🗑️</span>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- 聊天容器 -->
    <div class="chat-container">
        <!-- 欢迎卡片 -->
        <div class="welcome-card">
            <h2>ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨ᠎ᠠ ᠤᠤ？</h2>
            <p>我是您的蒙古文 AI 助手，可以帮助您学习蒙古语、翻译文本、解答问题。</p>
            
            <!-- 竖排快捷菜单 -->
            <div class="quick-replies-vertical">
                <button class="quick-reply-btn-vertical" onclick="sendQuickReply('ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨ᠎ᠠ ᠤᠤ？')">
                    <span class="mongolian-vertical">ᠰᠠᠶᠢᠨ</span>
                    <span class="mongolian-vertical">ᠪᠠᠶᠢᠨ᠎ᠠ</span>
                    <span class="mongolian-vertical">ᠤᠤ？</span>
                </button>
                <button class="quick-reply-btn-vertical" onclick="sendQuickReply('ᠪᠠᠶᠠᠷᠯᠠᠯ᠎ᠠ！')">
                    <span class="mongolian-vertical">ᠪᠠᠶᠠᠷᠯᠠᠯ᠎ᠠ！</span>
                </button>
                <button class="quick-reply-btn-vertical" onclick="sendQuickReply('ᠪᠢ ᠮᠣᠩᠭᠣᠯ ᠬᠡᠯᠡ ᠰᠤᠷᠤᠵᠤ ᠪᠠᠶᠢᠨᠠ᠃')">
                    <span class="mongolian-vertical">ᠪᠢ</span>
                    <span class="mongolian-vertical">ᠮᠣᠩᠭᠣᠯ</span>
                    <span class="mongolian-vertical">ᠬᠡᠯᠡ</span>
                </button>
            </div>
        </div>
        
        <div id="chat-content">
            <!-- 对话内容将由 JavaScript 加载 -->
        </div>
        
        <!-- 日期分隔符 -->
        <div class="divider">
            <span>今天</span>
        </div>
    </div>
    
    <!-- 输入框 -->
    <div class="input-bar">
        <div class="input-wrapper">
            <textarea 
                class="message-input" 
                placeholder="输入蒙古文..."
                rows="1"
                id="message-input"
            ></textarea>
        </div>
        <button class="send-button" onclick="sendMessage()" id="send-btn">发送</button>
    </div>
    
    <script>
        // 获取当前时间
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
        
        // 对话数据
        let chatData = [
            { 
                role: 'user', 
                text: 'ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨ᠎ᠠ ᠤᠤ？',
                time: '09:00'
            },
            { 
                role: 'ai', 
                text: 'ᠰᠠᠶᠢᠨ ᠪᠠᠶᠢᠨ᠎ᠠ！ᠪᠢ ᠮᠣᠩᠭᠣᠯ AI ᠲᠡᠭᠦᠰᠯᠡᠭᠴᠢ ᠪᠠᠶᠢᠨ᠎ᠠ᠃ ᠲᠠᠨᠳ ᠲᠤᠰᠠᠯᠠᠭ᠎ᠠ ᠪᠠᠶᠢᠭ᠎ᠠ ᠤᠤ？',
                time: '09:00'
            },
        ];
        
        // 渲染消息
        const chatContent = document.getElementById('chat-content');
        
        function renderMessage(message, animate = true) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${message.role}`;
            if (!animate) messageEl.style.animation = 'none';
            
            messageEl.innerHTML = `
                <div class="avatar">
                    ${message.role === 'user' ? '👤' : '🤖'}
                </div>
                <div>
                    <div class="message-content">
                        <div class="mongolian-vertical">
                            ${message.text}
                        </div>
                    </div>
                </div>
            `;
            
            return messageEl;
        }
        
        // 显示输入指示器
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typing-indicator';
            indicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatContent.appendChild(indicator);
            scrollToBottom();
        }
        
        // 隐藏输入指示器
        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }
        
        // 初始渲染
        function renderChat() {
            chatData.forEach(message => {
                chatContent.appendChild(renderMessage(message, false));
            });
            scrollToBottom();
        }
        
        // 滚动到底部
        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text) return;
            
            // 添加用户消息
            const userMessage = {
                role: 'user',
                text: text,
                time: getCurrentTime()
            };
            
            chatContent.appendChild(renderMessage(userMessage));
            chatData.push(userMessage);
            input.value = '';
            input.style.height = 'auto';
            scrollToBottom();
            
            // 显示输入指示器
            showTypingIndicator();
            
            // 模拟 AI 回复（延迟 1-2 秒）
            setTimeout(() => {
                hideTypingIndicator();
                
                const aiMessage = {
                    role: 'ai',
                    text: 'ᠮᠡᠳᠡᠭᠡ ᠪᠠᠶᠢᠨ᠎ᠠ！ᠪᠢ ᠲᠠᠨᠳ ᠲᠤᠰᠠᠯᠠᠭ᠎ᠠ ᠪᠣᠯᠨᠠ᠃ ᠲᠠ ᠶᠠᠮᠠᠷ ᠠᠰᠤᠭᠤᠯᠲᠠᠢ？',
                    time: getCurrentTime()
                };
                
                chatContent.appendChild(renderMessage(aiMessage));
                chatData.push(aiMessage);
                scrollToBottom();
            }, 1000 + Math.random() * 1000);
        }
        
        // 快捷回复
        function sendQuickReply(text) {
            document.getElementById('message-input').value = text;
            sendMessage();
        }
        
        // 清空对话
        function clearChat() {
            if (confirm('确定要清空对话吗？')) {
                chatData = [];
                chatContent.innerHTML = '';
            }
        }
        
        // 切换主题
        function toggleTheme() {
            const isDark = document.body.style.getPropertyValue('--gray-100') === '#1C1C1E';
            if (isDark) {
                document.documentElement.style.setProperty('--gray-100', '#F2F2F7');
                document.documentElement.style.setProperty('--white', '#FFFFFF');
                document.documentElement.style.setProperty('--black', '#000000');
            } else {
                document.documentElement.style.setProperty('--gray-100', '#1C1C1E');
                document.documentElement.style.setProperty('--white', '#2C2C2E');
                document.documentElement.style.setProperty('--black', '#FFFFFF');
            }
        }
        
        // 回车发送
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // 自动调整输入框高度
        document.getElementById('message-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // 页面加载完成
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                renderChat();
            }, 1000);
        });
    </script>
</body>
</html>
